<style>
:root{--bg-primary:#f8f7f4;--bg-card:#ffffff;--text-primary:#1a1a2e;--text-secondary:#3d3d56;--text-muted:#7a7a8e;--accent-amber:#d4880f;--border:rgba(0,0,0,0.1);--border-accent:rgba(0,0,0,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Meiryo','Yu Gothic UI','Noto Sans JP',sans-serif;background:var(--bg-primary);color:var(--text-primary);line-height:1.7;font-weight:400;}
.site-header{border-bottom:1px solid var(--border);padding:1.5rem 0;position:sticky;top:0;z-index:100;background:rgba(255,255,255,0.95);backdrop-filter:blur(20px);}
.header-inner{max-width:900px;margin:0 auto;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;}
.site-logo{font-family:'Noto Serif JP',serif;font-size:1.1rem;font-weight:700;color:var(--text-primary);text-decoration:none;display:flex;align-items:center;gap:0.5rem;}

.header-nav{display:flex;gap:1.2rem;}
.header-nav a{font-size:0.75rem;color:var(--text-secondary);text-decoration:none;letter-spacing:0.05em;transition:color 0.2s;font-weight:500;}
.header-nav a:hover{color:var(--text-primary);}
.content{max-width:700px;margin:0 auto;padding:3rem 1.5rem 5rem;}
.page-label{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--accent-amber);letter-spacing:0.3em;text-transform:uppercase;margin-bottom:0.5rem;}
h1{font-family:'Noto Serif JP',serif;font-size:1.8rem;font-weight:700;margin-bottom:1rem;line-height:1.4;}
h2{font-size:1.1rem;font-weight:700;margin:2rem 0 0.8rem;color:var(--text-primary);}
p{color:var(--text-secondary);font-size:0.92rem;margin-bottom:1rem;line-height:1.9;}
ul{color:var(--text-secondary);font-size:0.92rem;margin:0.5rem 0 1rem 1.5rem;line-height:2;}
a.back{display:inline-block;margin-top:2rem;font-size:0.85rem;color:var(--accent-amber);text-decoration:none;}
a.back:hover{text-decoration:underline;}
.form-wrapper{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:1.5rem 0;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.form-wrapper iframe{width:100%;border:none;min-height:900px;}
.note-box{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--accent-amber);border-radius:8px;padding:1.2rem;margin:1.5rem 0;font-size:0.88rem;color:var(--text-secondary);line-height:1.8;}
.note-box strong{color:var(--text-primary);}
