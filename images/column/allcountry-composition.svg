<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Yu Gothic UI', 'Meiryo', sans-serif">
  <rect width="800" height="450" fill="#ededed" rx="12"/>
  <text x="400" y="45" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a2e">オルカンの中身 ≒ 米国株63%</text>

  <!-- US portion -->
  <rect x="40" y="75" width="460" height="220" rx="10" fill="#2176ff" opacity="0.12"/>
  <rect x="40" y="75" width="460" height="220" rx="10" fill="none" stroke="#2176ff" stroke-width="2.5"/>
  <text x="270" y="165" text-anchor="middle" font-size="64" font-weight="700" fill="#2176ff">63%</text>
  <text x="270" y="205" text-anchor="middle" font-size="22" font-weight="600" fill="#2176ff">米国株</text>
  <text x="270" y="240" text-anchor="middle" font-size="15" fill="#7a7a8e">Apple, Microsoft, NVIDIA, Amazon...</text>

  <!-- Japan portion -->
  <rect x="510" y="75" width="60" height="220" rx="6" fill="#e63946" opacity="0.12"/>
  <rect x="510" y="75" width="60" height="220" rx="6" fill="none" stroke="#e63946" stroke-width="2"/>
  <text x="540" y="170" text-anchor="middle" font-size="20" font-weight="700" fill="#e63946">4.7%</text>
  <text x="540" y="200" text-anchor="middle" font-size="14" font-weight="600" fill="#e63946">日本</text>

  <!-- Others -->
  <rect x="580" y="75" width="180" height="220" rx="6" fill="#f0a500" opacity="0.08"/>
  <rect x="580" y="75" width="180" height="220" rx="6" fill="none" stroke="#f0a500" stroke-width="2"/>
  <text x="670" y="160" text-anchor="middle" font-size="22" font-weight="700" fill="#f0a500">32.3%</text>
  <text x="670" y="192" text-anchor="middle" font-size="16" font-weight="600" fill="#f0a500">欧州・新興国等</text>
  <text x="670" y="220" text-anchor="middle" font-size="13" fill="#7a7a8e">英国, フランス, 中国</text>
  <text x="670" y="240" text-anchor="middle" font-size="13" fill="#7a7a8e">インド, 台湾...</text>

  <!-- Bottom warning -->
  <rect x="60" y="320" width="680" height="110" rx="12" fill="#fff" stroke="#e63946" stroke-width="2"/>
  <text x="400" y="358" text-anchor="middle" font-size="18" font-weight="700" fill="#e63946">⚠️ オルカン + S&amp;P500 を併せ持つと</text>
  <text x="400" y="385" text-anchor="middle" font-size="18" font-weight="700" fill="#e63946">→ 米国株比率が80%超に</text>
  <text x="400" y="412" text-anchor="middle" font-size="15" fill="#7a7a8e">相関係数 0.97〜0.99 → 分散効果はほぼなし</text>
  <text x="400" y="435" text-anchor="middle" font-size="14" font-weight="600" fill="#f0a500">真の分散には日本株・債券・金などの組み合わせが必要</text>
</svg>
