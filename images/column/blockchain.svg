<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="'Yu Gothic UI', 'Meiryo', sans-serif">
  <rect width="800" height="350" fill="#ededed" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">ブロックチェーンの仕組み</text>

  <!-- Block 1 -->
  <rect x="30" y="60" width="220" height="230" rx="10" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="30" y="60" width="220" height="36" rx="10" fill="#1a1a2e"/>
  <rect x="30" y="82" width="220" height="14" fill="#1a1a2e"/>
  <text x="140" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Block #1</text>
  <text x="50" y="120" font-size="11" fill="#7a7a8e">前ブロックのハッシュ:</text>
  <text x="50" y="138" font-size="11" font-weight="700" fill="#1a1a2e" font-family="monospace">0000000000</text>
  <text x="50" y="165" font-size="11" fill="#7a7a8e">取引データ (Tx):</text>
  <text x="50" y="183" font-size="10" fill="#1a1a2e">A→B 1.5 BTC</text>
  <text x="50" y="198" font-size="10" fill="#1a1a2e">C→D 0.3 BTC</text>
  <text x="50" y="225" font-size="11" fill="#7a7a8e">このブロックのハッシュ:</text>
  <rect x="45" y="232" width="190" height="22" rx="4" fill="#f0a500" opacity="0.15"/>
  <text x="140" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#f0a500" font-family="monospace">7f8a3b...</text>
  <text x="50" y="278" font-size="10" fill="#7a7a8e">ナンス: 48291</text>

  <!-- Arrow 1→2 -->
  <line x1="255" y1="175" x2="285" y2="175" stroke="#f0a500" stroke-width="3"/>
  <polygon points="285,175 277,169 277,181" fill="#f0a500"/>

  <!-- Block 2 -->
  <rect x="290" y="60" width="220" height="230" rx="10" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="290" y="60" width="220" height="36" rx="10" fill="#1a1a2e"/>
  <rect x="290" y="82" width="220" height="14" fill="#1a1a2e"/>
  <text x="400" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Block #2</text>
  <text x="310" y="120" font-size="11" fill="#7a7a8e">前ブロックのハッシュ:</text>
  <rect x="305" y="126" width="190" height="18" rx="4" fill="#f0a500" opacity="0.15"/>
  <text x="400" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#f0a500" font-family="monospace">7f8a3b...</text>
  <text x="310" y="165" font-size="11" fill="#7a7a8e">取引データ (Tx):</text>
  <text x="310" y="183" font-size="10" fill="#1a1a2e">E→F 2.0 BTC</text>
  <text x="310" y="198" font-size="10" fill="#1a1a2e">G→H 0.7 BTC</text>
  <text x="310" y="225" font-size="11" fill="#7a7a8e">このブロックのハッシュ:</text>
  <rect x="305" y="232" width="190" height="22" rx="4" fill="#07e4dd" opacity="0.15"/>
  <text x="400" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#07e4dd" font-family="monospace">a3c9e1...</text>
  <text x="310" y="278" font-size="10" fill="#7a7a8e">ナンス: 73054</text>

  <!-- Arrow 2→3 -->
  <line x1="515" y1="175" x2="545" y2="175" stroke="#07e4dd" stroke-width="3"/>
  <polygon points="545,175 537,169 537,181" fill="#07e4dd"/>

  <!-- Block 3 -->
  <rect x="550" y="60" width="220" height="230" rx="10" fill="#fff" stroke="#1a1a2e" stroke-width="2"/>
  <rect x="550" y="60" width="220" height="36" rx="10" fill="#1a1a2e"/>
  <rect x="550" y="82" width="220" height="14" fill="#1a1a2e"/>
  <text x="660" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Block #3</text>
  <text x="570" y="120" font-size="11" fill="#7a7a8e">前ブロックのハッシュ:</text>
  <rect x="565" y="126" width="190" height="18" rx="4" fill="#07e4dd" opacity="0.15"/>
  <text x="660" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="#07e4dd" font-family="monospace">a3c9e1...</text>
  <text x="570" y="165" font-size="11" fill="#7a7a8e">取引データ (Tx):</text>
  <text x="570" y="183" font-size="10" fill="#1a1a2e">I→J 5.0 BTC</text>
  <text x="570" y="225" font-size="11" fill="#7a7a8e">このブロックのハッシュ:</text>
  <rect x="565" y="232" width="190" height="22" rx="4" fill="#e63946" opacity="0.15"/>
  <text x="660" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#e63946" font-family="monospace">d4f2b8...</text>
  <text x="570" y="278" font-size="10" fill="#7a7a8e">ナンス: 19827</text>

  <!-- Bottom label -->
  <text x="400" y="325" text-anchor="middle" font-size="12" fill="#7a7a8e">各ブロックが前のハッシュ値を保持 → 1つ変えると全て崩れる → 改ざん不可能</text>
  <text x="400" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#f0a500">これがブロックチェーンの改ざん耐性の仕組み</text>
</svg>
