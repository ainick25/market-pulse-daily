<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="'Helvetica Neue', Arial, sans-serif">
  <rect width="800" height="300" fill="#ededed" rx="12"/>
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">ハッシュ値とは</text>

  <!-- Input 1 -->
  <rect x="30" y="60" width="250" height="44" rx="8" fill="#fff" stroke="#1a1a2e" stroke-width="1.5"/>
  <text x="155" y="87" text-anchor="middle" font-size="13" fill="#1a1a2e">入力: "Hello"</text>

  <!-- Arrow -->
  <rect x="310" y="65" width="180" height="34" rx="17" fill="#f0a500"/>
  <text x="400" y="87" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">SHA-256 ハッシュ関数</text>

  <!-- Output 1 -->
  <rect x="520" y="60" width="250" height="44" rx="8" fill="#fff" stroke="#07e4dd" stroke-width="2"/>
  <text x="645" y="80" text-anchor="middle" font-size="10" font-weight="700" fill="#07e4dd" font-family="monospace">2cf24dba5fb0a30e</text>
  <text x="645" y="96" text-anchor="middle" font-size="10" font-weight="700" fill="#07e4dd" font-family="monospace">26e83b2ac5b9e29e...</text>

  <!-- Arrows -->
  <line x1="280" y1="82" x2="308" y2="82" stroke="#1a1a2e" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Input 2 (one char different) -->
  <rect x="30" y="130" width="250" height="44" rx="8" fill="#fff" stroke="#e63946" stroke-width="1.5"/>
  <text x="155" y="157" text-anchor="middle" font-size="13" fill="#e63946">入力: "Hello<tspan font-weight="700" fill="#e63946">!</tspan>"（1文字追加）</text>

  <!-- Arrow -->
  <rect x="310" y="135" width="180" height="34" rx="17" fill="#f0a500"/>
  <text x="400" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">SHA-256 ハッシュ関数</text>

  <!-- Output 2 (completely different) -->
  <rect x="520" y="130" width="250" height="44" rx="8" fill="#fff" stroke="#e63946" stroke-width="2"/>
  <text x="645" y="150" text-anchor="middle" font-size="10" font-weight="700" fill="#e63946" font-family="monospace">ce06092fb948d9ff</text>
  <text x="645" y="166" text-anchor="middle" font-size="10" font-weight="700" fill="#e63946" font-family="monospace">ab48de4946e3b367...</text>

  <!-- Arrows -->
  <line x1="280" y1="152" x2="308" y2="152" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="500" y1="82" x2="518" y2="82" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="500" y1="152" x2="518" y2="152" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Highlight box -->
  <rect x="80" y="200" width="640" height="78" rx="10" fill="#fff" stroke="#f0a500" stroke-width="1.5"/>
  <text x="400" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">たった1文字の違いでも → 全く異なるハッシュ値になる</text>
  <text x="400" y="252" text-anchor="middle" font-size="12" fill="#7a7a8e">✅ 同じ入力 → 常に同じ出力 ✅ 出力から入力は推測不可能 ✅ 固定長（256ビット）</text>
  <text x="400" y="270" text-anchor="middle" font-size="11" font-weight="600" fill="#f0a500">→ だから改ざんされたらすぐにわかる</text>
</svg>
