<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="400" fill="#ededed" rx="12"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">レバレッジの仕組み</text>

  <!-- Fulcrum (triangle) -->
  <polygon points="400,310 380,350 420,350" fill="#1a1a2e"/>
  <circle cx="400" cy="300" r="28" fill="#f0a500"/>
  <text x="400" y="307" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">×25</text>

  <!-- Lever bar (tilted - small side down, big side up) -->
  <line x1="160" y1="260" x2="640" y2="200" stroke="#1a1a2e" stroke-width="6" stroke-linecap="round"/>

  <!-- Left side: Small coin (自己資金) -->
  <g transform="translate(160, 180)">
    <!-- Coin shadow -->
    <ellipse cx="0" cy="82" rx="40" ry="8" fill="rgba(0,0,0,0.1)"/>
    <!-- Coin body -->
    <ellipse cx="0" cy="40" rx="38" ry="38" fill="#f0a500"/>
    <ellipse cx="0" cy="40" rx="30" ry="30" fill="#f0a500"/>
    <text x="0" y="36" text-anchor="middle" font-size="11" font-weight="700" fill="#1a1a2e">¥</text>
    <text x="0" y="52" text-anchor="middle" font-size="10" font-weight="600" fill="#1a1a2e">10万円</text>
  </g>
  <!-- Label -->
  <text x="160" y="370" text-anchor="middle" font-size="15" font-weight="600" fill="#7a7a8e">自己資金</text>

  <!-- Right side: Large coin stack (取引可能額) -->
  <g transform="translate(640, 70)">
    <!-- Stack of coins -->
    <ellipse cx="0" cy="130" rx="52" ry="10" fill="rgba(0,0,0,0.1)"/>
    <!-- Coin 1 (bottom) -->
    <ellipse cx="0" cy="110" rx="50" ry="14" fill="#c48800"/>
    <rect x="-50" y="96" width="100" height="14" fill="#f0a500"/>
    <ellipse cx="0" cy="96" rx="50" ry="14" fill="#f0a500"/>
    <!-- Coin 2 -->
    <ellipse cx="0" cy="78" rx="50" ry="14" fill="#c48800"/>
    <rect x="-50" y="64" width="100" height="14" fill="#f0a500"/>
    <ellipse cx="0" cy="64" rx="50" ry="14" fill="#f0a500"/>
    <!-- Coin 3 -->
    <ellipse cx="0" cy="46" rx="50" ry="14" fill="#c48800"/>
    <rect x="-50" y="32" width="100" height="14" fill="#f0a500"/>
    <ellipse cx="0" cy="32" rx="50" ry="14" fill="#f0a500"/>
    <!-- Coin 4 (top) -->
    <ellipse cx="0" cy="14" rx="50" ry="14" fill="#c48800"/>
    <rect x="-50" y="0" width="100" height="14" fill="#f0a500"/>
    <ellipse cx="0" cy="0" rx="50" ry="14" fill="#f0a500"/>
    <!-- Label on stack -->
    <text x="0" y="60" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">¥250万円</text>
  </g>
  <!-- Label -->
  <text x="640" y="370" text-anchor="middle" font-size="15" font-weight="600" fill="#7a7a8e">取引可能額</text>

  <!-- Arrow -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0a500"/>
    </marker>
  </defs>
  <line x1="250" y1="240" x2="540" y2="190" stroke="#f0a500" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowhead)"/>
</svg>
