<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="font-family:'Yu Gothic UI','Meiryo',sans-serif">
  <rect width="800" height="480" fill="#ededed"/>

  <!-- タイトル -->
  <text x="400" y="32" font-size="20" font-weight="700" text-anchor="middle" fill="#1a1a2e">政策金利と5つの金融商品の関係</text>
  <text x="400" y="54" font-size="12" text-anchor="middle" fill="#7a7a8e">中央銀行が利上げサイクルに入ると、各資産クラスはこう反応する</text>

  <!-- ヘッダ行 -->
  <g transform="translate(60, 90)">
    <rect x="0" y="0" width="220" height="44" rx="8" fill="#1a1a2e"/>
    <text x="110" y="27" font-size="13" font-weight="700" text-anchor="middle" fill="#f0a500">資産クラス</text>

    <rect x="230" y="0" width="220" height="44" rx="8" fill="#e63946"/>
    <text x="340" y="27" font-size="13" font-weight="700" text-anchor="middle" fill="#fff">利上げ局面の影響</text>

    <rect x="460" y="0" width="220" height="44" rx="8" fill="#06a77d"/>
    <text x="570" y="27" font-size="13" font-weight="700" text-anchor="middle" fill="#fff">利下げ局面の影響</text>
  </g>

  <!-- 行1: 債券 -->
  <g transform="translate(60, 150)">
    <rect x="0" y="0" width="220" height="50" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="1"/>
    <text x="20" y="32" font-size="14" font-weight="700" fill="#1a1a2e">📉 債券</text>
    <text x="120" y="32" font-size="11" fill="#7a7a8e">金利と逆相関</text>

    <rect x="230" y="0" width="220" height="50" rx="6" fill="rgba(230,57,70,0.12)" stroke="#e63946" stroke-width="1"/>
    <text x="340" y="25" font-size="18" font-weight="700" text-anchor="middle" fill="#e63946">▼ 下落</text>
    <text x="340" y="42" font-size="10" text-anchor="middle" fill="#7a7a8e">既発債の魅力低下</text>

    <rect x="460" y="0" width="220" height="50" rx="6" fill="rgba(6,167,125,0.12)" stroke="#06a77d" stroke-width="1"/>
    <text x="570" y="25" font-size="18" font-weight="700" text-anchor="middle" fill="#06a77d">▲ 上昇</text>
    <text x="570" y="42" font-size="10" text-anchor="middle" fill="#7a7a8e">既発債の魅力上昇</text>
  </g>

  <!-- 行2: 株式 -->
  <g transform="translate(60, 208)">
    <rect x="0" y="0" width="220" height="50" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="1"/>
    <text x="20" y="32" font-size="14" font-weight="700" fill="#1a1a2e">📉 株式</text>
    <text x="120" y="32" font-size="11" fill="#7a7a8e">割引率・借入コスト</text>

    <rect x="230" y="0" width="220" height="50" rx="6" fill="rgba(230,57,70,0.12)" stroke="#e63946" stroke-width="1"/>
    <text x="340" y="25" font-size="18" font-weight="700" text-anchor="middle" fill="#e63946">▼ 下落</text>
    <text x="340" y="42" font-size="10" text-anchor="middle" fill="#7a7a8e">グロース株が弱い</text>

    <rect x="460" y="0" width="220" height="50" rx="6" fill="rgba(6,167,125,0.12)" stroke="#06a77d" stroke-width="1"/>
    <text x="570" y="25" font-size="18" font-weight="700" text-anchor="middle" fill="#06a77d">▲ 上昇</text>
    <text x="570" y="42" font-size="10" text-anchor="middle" fill="#7a7a8e">リスクオン・買い</text>
  </g>

  <!-- 行3: コモディティ -->
  <g transform="translate(60, 266)">
    <rect x="0" y="0" width="220" height="50" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="1"/>
    <text x="20" y="32" font-size="14" font-weight="700" fill="#1a1a2e">🛢 コモディティ</text>
    <text x="120" y="32" font-size="11" fill="#7a7a8e">金・原油</text>

    <rect x="230" y="0" width="220" height="50" rx="6" fill="rgba(230,57,70,0.08)" stroke="#e63946" stroke-width="1"/>
    <text x="340" y="25" font-size="18" font-weight="700" text-anchor="middle" fill="#e63946">▼ 弱含み</text>
    <text x="340" y="42" font-size="10" text-anchor="middle" fill="#7a7a8e">金の保有コスト↑</text>

    <rect x="460" y="0" width="220" height="50" rx="6" fill="rgba(6,167,125,0.08)" stroke="#06a77d" stroke-width="1"/>
    <text x="570" y="25" font-size="18" font-weight="700" text-anchor="middle" fill="#06a77d">▲ 底堅い</text>
    <text x="570" y="42" font-size="10" text-anchor="middle" fill="#7a7a8e">実質金利低下で金↑</text>
  </g>

  <!-- 行4: 暗号資産 -->
  <g transform="translate(60, 324)">
    <rect x="0" y="0" width="220" height="50" rx="6" fill="#fff" stroke="#1a1a2e" stroke-width="1"/>
    <text x="20" y="32" font-size="14" font-weight="700" fill="#1a1a2e">₿ 暗号資産</text>
    <text x="120" y="32" font-size="11" fill="#7a7a8e">流動性感応度</text>

    <rect x="230" y="0" width="220" height="50" rx="6" fill="rgba(230,57,70,0.18)" stroke="#e63946" stroke-width="1"/>
    <text x="340" y="25" font-size="18" font-weight="700" text-anchor="middle" fill="#e63946">▼▼ 大幅下落</text>
    <text x="340" y="42" font-size="10" text-anchor="middle" fill="#7a7a8e">流動性縮小で売り</text>

    <rect x="460" y="0" width="220" height="50" rx="6" fill="rgba(6,167,125,0.18)" stroke="#06a77d" stroke-width="1"/>
    <text x="570" y="25" font-size="18" font-weight="700" text-anchor="middle" fill="#06a77d">▲▲ 大幅上昇</text>
    <text x="570" y="42" font-size="10" text-anchor="middle" fill="#7a7a8e">リスクオンで資金流入</text>
  </g>

  <!-- 行5: 為替 -->
  <g transform="translate(60, 382)">
    <rect x="0" y="0" width="220" height="50" rx="6" fill="#fff" stroke="#f0a500" stroke-width="2"/>
    <text x="20" y="32" font-size="14" font-weight="700" fill="#1a1a2e">💱 為替</text>
    <text x="120" y="32" font-size="11" fill="#7a7a8e">金利差が主因</text>

    <rect x="230" y="0" width="220" height="50" rx="6" fill="rgba(240,165,0,0.18)" stroke="#f0a500" stroke-width="2"/>
    <text x="340" y="25" font-size="18" font-weight="700" text-anchor="middle" fill="#d4880f">▲ 通貨高</text>
    <text x="340" y="42" font-size="10" text-anchor="middle" fill="#7a7a8e">その通貨が買われる</text>

    <rect x="460" y="0" width="220" height="50" rx="6" fill="rgba(240,165,0,0.18)" stroke="#f0a500" stroke-width="2"/>
    <text x="570" y="25" font-size="18" font-weight="700" text-anchor="middle" fill="#d4880f">▼ 通貨安</text>
    <text x="570" y="42" font-size="10" text-anchor="middle" fill="#7a7a8e">その通貨が売られる</text>
  </g>

  <!-- 補足 -->
  <text x="400" y="460" font-size="10" text-anchor="middle" fill="#7a7a8e">※ あくまで「理論的な基本方向」。地政学リスク・他国の動向・財政政策で結果は変動する</text>
</svg>
