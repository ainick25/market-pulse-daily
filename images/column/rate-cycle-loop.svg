<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" style="font-family:'Yu Gothic UI','Meiryo',sans-serif">
  <rect width="800" height="420" fill="#ededed"/>

  <!-- タイトル -->
  <text x="400" y="35" font-size="20" font-weight="700" text-anchor="middle" fill="#1a1a2e">景気サイクルと金利政策のループ</text>
  <text x="400" y="56" font-size="12" text-anchor="middle" fill="#7a7a8e">中央銀行は景気の循環に合わせてアクセル（利下げ）とブレーキ（利上げ）を踏み分ける</text>

  <!-- 円形ループの中心 -->
  <g transform="translate(400, 240)">
    <!-- 中央のR*インジケーター -->
    <circle r="58" fill="#fff" stroke="#07e4dd" stroke-width="2"/>
    <text y="-10" font-size="13" font-weight="700" text-anchor="middle" fill="#1a1a2e">中立金利</text>
    <text y="10" font-size="18" font-weight="700" text-anchor="middle" fill="#07e4dd">R*</text>
    <text y="30" font-size="10" text-anchor="middle" fill="#7a7a8e">均衡水準</text>
  </g>

  <!-- 4つのフェーズ（円形配置） -->
  <!-- 上: 景気過熱 -->
  <g transform="translate(400, 100)">
    <rect x="-95" y="-30" width="190" height="60" rx="12" fill="#e63946" stroke="#1a1a2e" stroke-width="1.5"/>
    <text y="-5" font-size="14" font-weight="700" text-anchor="middle" fill="#fff">① 景気過熱</text>
    <text y="15" font-size="11" text-anchor="middle" fill="#fff">インフレ高・失業率低</text>
  </g>

  <!-- 右: 利上げ → 冷却 -->
  <g transform="translate(650, 240)">
    <rect x="-95" y="-30" width="190" height="60" rx="12" fill="#1a1a2e" stroke="#f0a500" stroke-width="2"/>
    <text y="-5" font-size="14" font-weight="700" text-anchor="middle" fill="#f0a500">② 利上げ</text>
    <text y="15" font-size="11" text-anchor="middle" fill="#fff">借入コスト↑・需要↓</text>
  </g>

  <!-- 下: 景気後退 -->
  <g transform="translate(400, 380)">
    <rect x="-95" y="-30" width="190" height="60" rx="12" fill="#2176ff" stroke="#1a1a2e" stroke-width="1.5"/>
    <text y="-5" font-size="14" font-weight="700" text-anchor="middle" fill="#fff">③ 景気後退</text>
    <text y="15" font-size="11" text-anchor="middle" fill="#fff">インフレ低・失業率高</text>
  </g>

  <!-- 左: 利下げ → 回復 -->
  <g transform="translate(150, 240)">
    <rect x="-95" y="-30" width="190" height="60" rx="12" fill="#1a1a2e" stroke="#06a77d" stroke-width="2"/>
    <text y="-5" font-size="14" font-weight="700" text-anchor="middle" fill="#06a77d">④ 利下げ</text>
    <text y="15" font-size="11" text-anchor="middle" fill="#fff">借入コスト↓・需要↑</text>
  </g>

  <!-- 矢印（時計回り） -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0a500"/>
    </marker>
  </defs>

  <!-- 上→右 -->
  <path d="M 500 130 Q 600 150 620 200" fill="none" stroke="#f0a500" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- 右→下 -->
  <path d="M 620 280 Q 600 340 500 360" fill="none" stroke="#f0a500" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- 下→左 -->
  <path d="M 300 360 Q 200 340 180 280" fill="none" stroke="#06a77d" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- 左→上 -->
  <path d="M 180 200 Q 200 150 300 130" fill="none" stroke="#06a77d" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
