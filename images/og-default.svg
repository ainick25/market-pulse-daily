<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(60,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(120,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(180,0)" />
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fff" stroke-width="1" transform="translate(240,0)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,60)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,120)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,180)" />
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fff" stroke-width="1" transform="translate(0,240)" />
  </g>
  <!-- Gold accent line -->
  <rect x="100" y="230" width="60" height="4" rx="2" fill="#f0a500"/>
  <!-- Title -->
  <text x="100" y="290" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="56" font-weight="700" fill="#ffffff">MARKETZ</text>
  <!-- Subtitle -->
  <text x="100" y="340" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="24" fill="rgba(255,255,255,0.7)">Global Market Intelligence — マーケットニュース &amp; 解説</text>
  <!-- Bottom bar -->
  <rect x="0" y="610" width="1200" height="20" fill="#f0a500"/>
  <!-- URL -->
  <text x="100" y="400" font-family="monospace" font-size="16" fill="#ffe066" letter-spacing="0.1em">marketpulse-daily.com</text>
</svg>
