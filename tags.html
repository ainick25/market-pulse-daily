<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タグ検索 — Market Pulse Daily</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg-primary:#0a0a0f;--bg-card:#181822;--bg-card-hover:#20202e;--text-primary:#eeecf5;--text-secondary:#c4beda;--text-muted:#918aab;--accent-red:#ff4d6a;--accent-green:#2eec8a;--accent-gold:#ffe066;--accent-blue:#56ccff;--accent-purple:#c9a4ff;--accent-orange:#ffab30;--border:rgba(255,255,255,0.12);--border-accent:rgba(255,255,255,0.2)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP',sans-serif;font-weight:400;background:var(--bg-primary);color:var(--text-secondary);line-height:1.75;font-size:16px}
a{color:var(--accent-blue);text-decoration:none}
a:hover{text-decoration:underline}
.container{max-width:900px;margin:0 auto;padding:0 1.5rem}

/* Header */
.page-header{padding:4rem 0 2rem;text-align:center;border-bottom:1px solid var(--border)}
.page-header h1{font-family:'Noto Serif JP',serif;font-weight:700;font-size:2rem;color:var(--text-primary);margin-bottom:0.5rem}
.page-header p{color:var(--text-muted);font-size:0.9rem}

/* Navigation */
.site-nav{padding:1rem 0;border-bottom:1px solid var(--border);margin-bottom:2rem}
.site-nav-inner{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap}
.site-nav a{color:var(--text-secondary);font-size:0.85rem;padding:0.3rem 0.6rem;border-radius:4px;border:1px solid transparent;transition:all 0.2s}
.site-nav a:hover,.site-nav a.active{border-color:var(--border-accent);color:var(--text-primary);background:rgba(255,255,255,0.04);text-decoration:none}

/* Tag Cloud */
.tag-cloud{display:flex;flex-wrap:wrap;gap:0.6rem;justify-content:center;padding:2rem 0;margin-bottom:2rem;border-bottom:1px solid var(--border)}
.tag-pill{font-family:'JetBrains Mono',monospace;padding:0.4rem 0.9rem;border:1px solid var(--border-accent);border-radius:20px;color:var(--text-secondary);cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block}
.tag-pill:hover,.tag-pill.active{border-color:var(--accent-gold);color:var(--accent-gold);background:rgba(255,224,102,0.08);text-decoration:none}
.tag-pill .count{font-size:0.7em;opacity:0.6;margin-left:0.3rem}

/* Post Items */
.results-header{font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--accent-gold);margin-bottom:1rem;letter-spacing:0.1em}
.post-item{display:block;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:1.2rem 1.5rem;margin-bottom:0.6rem;text-decoration:none;transition:all 0.2s}
.post-item:hover{background:var(--bg-card-hover);border-color:var(--border-accent);text-decoration:none}
.post-date{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--accent-gold);letter-spacing:0.1em}
.post-title-text{font-weight:700;font-size:0.95rem;color:var(--text-primary);margin:0.3rem 0}
.post-excerpt{font-size:0.8rem;color:var(--text-muted)}
.post-tags{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.5rem}
.post-tags .tag{font-family:'JetBrains Mono',monospace;font-size:0.65rem;padding:0.15rem 0.5rem;border-radius:3px;background:rgba(255,255,255,0.05);color:var(--text-muted);border:1px solid var(--border);cursor:pointer;transition:all 0.2s}
.post-tags .tag:hover{border-color:var(--accent-gold);color:var(--accent-gold)}

/* Loading / Empty */
.loading{text-align:center;padding:4rem 0;color:var(--text-muted)}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent-gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:1rem}
@keyframes spin{to{transform:rotate(360deg)}}
#no-results{display:none;text-align:center;padding:3rem 0;color:var(--text-muted)}

/* Footer */
footer{text-align:center;padding:2rem;font-size:0.75rem;color:var(--text-muted);border-top:1px solid var(--border);margin-top:3rem}

</style>
<meta name="description" content="タグで市場ニュースを絞り込み検索。FX・株式・コモディティ・暗号資産の関連記事を探せます。">
<link rel="canonical" href="https://ainick25.github.io/market-pulse-daily/tags.html">
<meta property="og:type" content="website">
<meta property="og:title" content="タグ検索 — Market Pulse Daily">
<meta property="og:description" content="タグで市場ニュースを絞り込み検索。FX・株式・コモディティ・暗号資産の関連記事を探せます。">
<meta property="og:url" content="https://ainick25.github.io/market-pulse-daily/tags.html">
<meta property="og:site_name" content="Market Pulse Daily">
<meta property="og:locale" content="ja_JP">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="タグ検索 — Market Pulse Daily">
<meta name="twitter:description" content="タグで市場ニュースを絞り込み検索。">
</head>
<body>

<div class="container">
  <nav class="site-nav">
    <div class="site-nav-inner">
      <a href="index.html">ホーム</a>
      <a href="archive.html">アーカイブ</a>
      <a href="tags.html" class="active">タグ</a>
      <a href="about.html">このサイトについて</a>
      <a href="disclaimer.html">免責事項</a>
    </div>
  </nav>

  <header class="page-header">
    <h1>🏷 タグ検索</h1>
    <p>タグをクリックして関連記事を絞り込み</p>
  </header>

  <div id="tag-cloud" class="tag-cloud">
    <div class="loading"><div class="spinner"></div><p>読み込み中...</p></div>
  </div>

  <div id="results-section" style="display:none">
    <div id="results-header" class="results-header"></div>
    <div id="results-list"></div>
  </div>
  <div id="no-results">該当する記事が見つかりません。</div>
</div>

<footer>
  <p>&copy; 2026 Market Pulse Daily. All rights reserved.</p>
</footer>

<script>
(async () => {
  const cloudEl = document.getElementById('tag-cloud');
  const resultsSection = document.getElementById('results-section');
  const resultsHeader = document.getElementById('results-header');
  const resultsList = document.getElementById('results-list');
  const noResults = document.getElementById('no-results');

  let allPosts = [];
  let tagCounts = {};

  try {
    const res = await fetch('data/posts.json');
    const { posts } = await res.json();
    allPosts = posts;

    // Count tags
    posts.forEach(p => {
      (p.tags || []).forEach(t => {
        tagCounts[t] = (tagCounts[t] || 0) + 1;
      });
    });

    // Sort by count desc, limit 25
    const sorted = Object.entries(tagCounts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 25);

    const maxCount = sorted[0] ? sorted[0][1] : 1;
    const minSize = 0.75;
    const maxSize = 1.4;

    cloudEl.innerHTML = sorted.map(([tag, count]) => {
      const size = minSize + (count / maxCount) * (maxSize - minSize);
      return `<a class="tag-pill" href="#${encodeURIComponent(tag)}" data-tag="${tag}" style="font-size:${size}rem">${tag}<span class="count">(${count})</span></a>`;
    }).join('');

    // Handle hash
    const showTag = (tag) => {
      document.querySelectorAll('.tag-pill').forEach(el => {
        el.classList.toggle('active', el.dataset.tag === tag);
      });

      const filtered = allPosts.filter(p => (p.tags || []).includes(tag));

      if (filtered.length === 0) {
        resultsSection.style.display = 'none';
        noResults.style.display = 'block';
        return;
      }

      noResults.style.display = 'none';
      resultsSection.style.display = 'block';
      resultsHeader.textContent = `"${tag}" — ${filtered.length}件`;

      const days = ['日','月','火','水','木','金','土'];
      resultsList.innerHTML = filtered.map(p => {
        const d = new Date(p.date + 'T00:00:00+09:00');
        const dayStr = days[d.getDay()];
        const tagsHtml = (p.tags || []).slice(0, 6).map(t =>
          `<span class="tag" data-tag="${t}">${t}</span>`
        ).join('');
        return `
          <a href="posts/${p.slug}.html" class="post-item">
            <div class="post-date">${p.date} (${dayStr})</div>
            <div class="post-title-text">${p.title || '(タイトルなし)'}</div>
            <div class="post-excerpt">${p.excerpt || ''}</div>
            ${tagsHtml ? `<div class="post-tags">${tagsHtml}</div>` : ''}
          </a>`;
      }).join('');

      // Allow clicking tags within results
      resultsList.querySelectorAll('.tag').forEach(el => {
        el.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          location.hash = encodeURIComponent(el.dataset.tag);
        });
      });
    };

    const onHash = () => {
      const hash = decodeURIComponent(location.hash.slice(1));
      if (hash && tagCounts[hash]) {
        showTag(hash);
      } else {
        resultsSection.style.display = 'none';
        noResults.style.display = 'none';
        document.querySelectorAll('.tag-pill').forEach(el => el.classList.remove('active'));
      }
    };

    window.addEventListener('hashchange', onHash);
    onHash();

  } catch (e) {
    cloudEl.innerHTML = '<p>データの読み込みに失敗しました。</p>';
    console.error(e);
  }
})();
</script>
</body>
</html>
